<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found | Paula Hewlett</title>
  <link rel="icon" href="/src/assets/images/ph-logo.png" type="image/x-icon" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Manrope:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root { --accent: #d4845a; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Manrope', sans-serif;
      background: #fdf8f3;
      color: #2c2118;
      text-align: center;
      padding: 2rem;
    }
    .wrap { max-width: 420px; }
    h1 {
      font-family: 'Montserrat', sans-serif;
      font-size: clamp(5rem, 15vw, 8rem);
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
      margin-bottom: .5rem;
    }
    p {
      font-size: 1.1rem;
      color: #7a6255;
      margin-bottom: 2rem;
      line-height: 1.6;
    }
    a {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      padding: .75rem 1.75rem;
      border-radius: 99px;
      background: var(--accent);
      color: #fff;
      font-weight: 500;
      text-decoration: none;
      transition: background .2s, transform .2s;
    }
    a:hover { background: #be6e47; transform: translateY(-2px); }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>404</h1>
    <p>The page you're looking for doesn't exist or has been moved.</p>
    <a href="/">Back to Portfolio</a>
  </div>
</body>
</html>
